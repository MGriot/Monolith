services:
  # ---------------------------------------------------------------------------
  # Database: PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: monolith_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monolith_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monolith_password}
      POSTGRES_DB: ${POSTGRES_DB:-monolith_db}
    ports:
      - "54321:5432"
    volumes:
      - monolith_pgdata:/var/lib/postgresql/data
    networks:
      - monolith_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monolith_user -d monolith_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend: FastAPI
  # ---------------------------------------------------------------------------
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: monolith_backend
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-monolith_user}:${POSTGRES_PASSWORD:-monolith_password}@db:5432/${POSTGRES_DB:-monolith_db}
      SECRET_KEY: ${SECRET_KEY:-changeme_in_prod}
    ports:
      - "8000:8000" # Expose backend directly for API docs / debugging
    volumes:
      - ./backend:/app
      - monolith_media:/app/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - monolith_net

  # ---------------------------------------------------------------------------
  # Frontend: React (Vite) - Development Mode with Hot Reload
  # ---------------------------------------------------------------------------
  frontend:
    # Use the build stage from the Dockerfile but override the command
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: build-stage
    container_name: monolith_frontend
    restart: always
    ports:
      - "5173:5173" # Vite HMR port
      - "8180:5173" # Map the "old" 8180 port to the dev server as well
    volumes:
      - ./frontend:/app
      - /app/node_modules # Avoid overwriting node_modules inside the container
    # Run the development server instead of building for production
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
    networks:
      - monolith_net

  # ---------------------------------------------------------------------------
  # MCP Server
  # ---------------------------------------------------------------------------
  mcp-server:
    build:
      context: .
      dockerfile: mcp/Dockerfile
    container_name: monolith_mcp
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-monolith_user}:${POSTGRES_PASSWORD:-monolith_password}@db:5432/${POSTGRES_DB:-monolith_db}
      SECRET_KEY: ${SECRET_KEY:-changeme_in_prod}
    volumes:
      - ./mcp:/app
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - monolith_net

volumes:
  monolith_pgdata:
  monolith_media:

networks:
  monolith_net:
    driver: bridge